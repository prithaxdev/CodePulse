services:
  - type: web
    name: codepulse-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ORIGINS
        value: http://localhost:3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
